openapi: 3.0.0
info:
  title: Mission Data API
  version: 1.0.0
servers:
  - url: /
paths:
  /mission:
    post:
      summary: Submit a mission and receive the mission ID
      operationId: mission_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Mission"
        required: true
      responses:
        "200":
          description: Successfully received mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionIdResponse"
        "400":
          description: Invalid input
        "500":
          description: Server error
      x-openapi-router-controller: REST.default_controller
components:
  schemas:
    Mission:
      required:
        - commands
        - missionId
        - tasks
        - vehicles
        - navigationArea  # Added navigationArea as required
      type: object
      properties:
        missionId:
          type: integer
          example: 1
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        vehicles:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        commands:
          type: array
          items:
            $ref: "#/components/schemas/Command"
        navigationArea:  # Added navigationArea property
          $ref: "#/components/schemas/NavigationArea"
    Coordinate:  # New schema for coordinates
      type: object
      required:
        - latitude
        - longitude
        - altitude
      properties:
        latitude:
          type: number
          example: 40.074105
        longitude:
          type: number
          example: -4.610650
        altitude:
          type: number
          example: 0
    NavigationArea:  # New schema for navigation area
      type: object
      properties:
        area:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
    Task:
      required:
        - assignedVehicleId
        - id
        - missionId
        - taskStatus
        - taskType
      type: object
      properties:
        taskType:
          type: string
          example: TRANSIT
          enum:
            - TRANSIT
            - SURVEY
            - TREATMENT
        id:
          type: integer
          example: 1
        missionId:
          type: integer
          example: 1
        taskStatus:
          type: string
          example: NotAssigned
          enum:
            - NotAssigned
        assignedVehicleId:
          type: integer
          example: 1
        taskDependency:
          $ref: "#/components/schemas/TaskDependency"
    TaskDependency:
      required:
        - dependencyResultType
        - dependencyStatus
        - dependencyTaskId
        - dependencyTaskStatus
      type: object
      properties:
        dependencyStatus:
          type: string
          example: NotModified
          enum:
            - NotModified
        dependencyTaskId:
          type: integer
          example: 2
        dependencyTaskStatus:
          type: string
          example: Finished
          enum:
            - Finished
        dependencyResultType:
          type: array
          example:
            - 0
          items:
            type: integer
    Vehicle:
      required:
        - id
        - type
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          example: AUAV
          enum:
            - AUAV
    Command:
      required:
        - commandStatus
        - commandType
        - id
        - params
        - relatedTask
        - startTime
      type: object
      properties:
        relatedTask:
          $ref: "#/components/schemas/RelatedTask"
        id:
          type: integer
          example: 1
        commandType:
          type: string
          example: NAV_TAKEOFF
          enum:
            - NAV_TAKEOFF
            - NAV_WAYPOINT
            - CAMERA_IMAGE
            - ANALYZE_IMAGE
            - NAV_HOME
            - NAV_LAND
            - SPRAY
        commandStatus:
          type: string
          example: NotAssigned
          enum:
            - NotAssigned
        startTime:
          type: integer
          example: 1
        params:
          type: array
          example:
            - 0
            - 0
            - 0
            - 0
          items:
            type: number
    RelatedTask:
      required:
        - id
        - missionId
      type: object
      properties:
        id:
          type: integer
          example: 1
        missionId:
          type: integer
          example: 1
    MissionIdResponse:
      required:
        - missionId
      type: object
      properties:
        missionId:
          type: integer
          example: 1
      example:
        missionId: 1